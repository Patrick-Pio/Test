<div class="container">

  <!-- LEFT SIDE (3D VIEW) -->
  <div class="left">
    <app-car-3d-viewer
      *ngIf="!loading && modelPath"
      [model]="modelPath">
    </app-car-3d-viewer>
  </div>

  <!-- RIGHT SIDE (DETAILS) -->
  <div class="right">

    <div class="top-bar">
      <button class="back-btn" (click)="goBack()">← Back</button>
    </div>

    <!-- LOADING STATE -->
    <div *ngIf="loading" class="loading-state">Loading...</div>

    <ng-container *ngIf="!loading">

      <h2>{{ carName }}</h2>

      <div class="details-container">

        <!-- SPECS -->
        <div class="specs">
          <div class="row"><span>Engine</span><b>{{ engine }}</b></div>
          <div class="row"><span>Power</span><b>{{ power }}</b></div>
          <div class="row"><span>Top Speed</span><b>{{ topSpeed }}</b></div>
          <div class="row"><span>0-100 km/h</span><b>{{ acceleration }}</b></div>
          <div class="row"><span>Fuel Type</span><b>{{ fuelType }}</b></div>
          <div class="row"><span>Transmission</span><b>{{ transmission }}</b></div>
        </div>

        <!-- DESCRIPTION -->
        <div class="description">
          <p>{{ description }}</p>
        </div>

      </div>

      <button class="test-drive-btn" (click)="bookTestDrive()">
        Book Test Drive
      </button>

    </ng-container>

  </div>

</div>
