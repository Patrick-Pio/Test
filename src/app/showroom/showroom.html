<div class="container">
  
  <div class="navbar">
    <h1>CAR SHOWROOM</h1>
    <div class="nav-buttons">
      
      <button *ngIf="isAdmin" class="add-btn" (click)="goToAddCar()">
        + Add Car
      </button>

      <button (click)="goToBookings()">My Bookings</button>
      <button (click)="logout()">Logout</button>
    </div>
  </div>

  <!-- ✅ FIXED GRID -->
  <div *ngIf="cars.length > 0; else loading" class="grid">
    
    <div class="card" *ngFor="let car of cars">

      <img [src]="car.image_url" alt="car">

      <h2>{{ car.name }}</h2>
      <p>{{ car.price }}</p>

      <button [routerLink]="['/car', car.id]">
        View Details
      </button>

    </div>

  </div>

  <!-- ✅ LOADING STATE -->
  <ng-template #loading>
    <p>Loading cars...</p>
  </ng-template>

</div>
