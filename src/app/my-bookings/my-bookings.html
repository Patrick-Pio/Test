<div class="container">
  <h1>My Bookings</h1>

  <div *ngIf="loading">Loading...</div>

  <div *ngIf="!loading && bookings.length === 0">
    <p>No upcoming bookings :(</p>
  </div>

  <!-- GLOBAL ERROR BANNER -->
  <div class="inline-message inline-message--error" *ngIf="errorMessage">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span>{{ errorMessage }}</span>
  </div>

  <div class="card" *ngFor="let b of bookings">

    <h2>{{ b.car_name }}</h2>

    <p><strong>Date:</strong> {{ b.date }}</p>
    <p><strong>Time:</strong> {{ b.time_slot }}</p>

    <p *ngIf="b.notes">
      <strong>Notes:</strong> {{ b.notes }}
    </p>

    <!-- CANCEL BUTTON -->
    <button
      class="btn-cancel"
      (click)="openCancelConfirm(b.id)"
      *ngIf="confirmCancelId !== b.id">
      Cancel
    </button>

    <!-- INLINE CONFIRM BOX -->
    <div class="confirm-box" *ngIf="confirmCancelId === b.id">
      <p class="confirm-text">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align: middle; margin-right: 6px;">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Are you sure you want to cancel this booking?
      </p>
      <div class="confirm-actions">
        <button class="btn-confirm-yes" (click)="confirmCancel()">Yes, Cancel</button>
        <button class="btn-confirm-no" (click)="dismissCancel()">Keep It</button>
      </div>
    </div>

  </div>
</div>
