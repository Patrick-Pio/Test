<div class="add-car-page">
  <div class="add-car-box">
    <button class="back-btn" type="button" (click)="goBack()">← Back</button>

    <h1>Add New Car</h1>

    <div class="msg error" *ngIf="errorMessage">
      ✕ {{ errorMessage }}
    </div>

    <form (ngSubmit)="addCar()">
      <input type="text" placeholder="Car Name" [(ngModel)]="car.name" name="name">
      <input type="text" placeholder="Price" [(ngModel)]="car.price" name="price">
      <input type="text" placeholder="Engine" [(ngModel)]="car.engine" name="engine">
      <input type="text" placeholder="Power" [(ngModel)]="car.power" name="power">
      <input type="text" placeholder="Top Speed" [(ngModel)]="car.top_speed" name="top_speed">
      <input type="text" placeholder="0-100 km/h" [(ngModel)]="car.acceleration" name="acceleration">
      <input type="text" placeholder="Fuel Type" [(ngModel)]="car.fuel_type" name="fuel_type">
      <input type="text" placeholder="Transmission" [(ngModel)]="car.transmission" name="transmission">
      <textarea placeholder="Description" [(ngModel)]="car.description" name="description"></textarea>
      <input type="text" placeholder="Image URL" [(ngModel)]="car.image_url" name="image_url">
      <input type="text" placeholder="Model URL" [(ngModel)]="car.model_path" name="model_path">

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Adding...' : 'Add Car' }}
      </button>
    </form>
  </div>
</div>
